<style>

  .header-stats { display: flex; gap: 20px; font-size: 0.85rem; }

  .main-container { flex: 1; display: flex; overflow: hidden; position: relative; }
  .sidebar { width: 400px; background: var(--darker); border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 900; transition: transform 0.3s ease; }
  .sidebar-controls { padding: 1.5rem; background: rgba(0,0,0,0.2); border-bottom: 1px solid #333; overflow-y: auto; max-height: 50vh; }
  .search-box { position: relative; margin-bottom: 1.2rem; }
  .search-box input { width: 100%; padding: 0.9rem 1rem 0.9rem 2.8rem; border-radius: 12px; border: 1px solid #444; background: var(--dark); color: white; font-family: 'Inter', sans-serif; outline: none; font-size: 0.9rem; }
  .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.2); }
  .search-box i { position: absolute; left: 1.1rem; top: 50%; transform: translateY(-50%); color: var(--gray); }
  .filter-group { margin-bottom: 1.2rem; }
  .filter-group h4 { font-size: 0.75rem; color: var(--gray); margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }

  .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
  .filter-btn.active { background: var(--primary); color: var(--dark); border-color: var(--primary); font-weight: 700; }
  .shop-list { flex: 1; overflow-y: auto; padding: 1rem; }
  .shop-list::-webkit-scrollbar { width: 6px; }
  .shop-list::-webkit-scrollbar-track { background: var(--darker); }
  .shop-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  .shop-item { padding: 1.2rem; margin-bottom: 0.8rem; border-radius: 12px; border-left: 5px solid transparent; background: var(--dark); cursor: pointer; transition: all 0.25s ease; }
  .shop-item:hover { border-left-color: var(--secondary); background: #252525; transform: translateX(4px); }
  .shop-item.active { border-left-color: var(--primary); background: #252525; box-shadow: 0 0 20px rgba(46, 204, 113, 0.15); }
  .shop-header { display: flex; justify-content: space-between; margin-bottom: 0.6rem; }
  .shop-name { font-weight: 700; font-size: 1rem; color: white; display: flex; align-items: center; gap: 8px; }
  .shop-province { font-size: 0.65rem; padding: 0.25rem 0.6rem; border-radius: 6px; font-weight: 700; text-transform: uppercase; height: fit-content; }
  .province-bcn { background: rgba(52, 152, 219, 0.2); color: #3498DB; }
  .province-gi { background: rgba(46, 204, 113, 0.2); color: #2ECC71; }
  .province-ll { background: rgba(241, 196, 15, 0.2); color: #F1C40F; }
  .province-tgn { background: rgba(155, 89, 182, 0.2); color: #9B59B6; }
  .province-ad { background: rgba(231, 76, 60, 0.2); color: #E74C3C; }
  .shop-desc { font-size: 0.85rem; color: var(--gray); margin-bottom: 0.5rem; line-height: 1.5; }
  .shop-contact { font-size: 0.8rem; color: #888; margin-bottom: 0.6rem; display: flex; flex-direction: column; gap: 4px; }
  .shop-contact div { display: flex; align-items: center; gap: 8px; }
  .shop-contact i { width: 14px; text-align: center; color: #555; font-size: 0.75rem; }
  .shop-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.6rem; }
  .tag { font-size: 0.7rem; padding: 0.3rem 0.7rem; border-radius: 12px; border: 1px solid #444; color: var(--gray); }
  .tag-electrica { border-color: var(--success); color: var(--success); background: rgba(39, 174, 96, 0.1); }
  .tag-oficial { border-color: var(--danger); color: var(--danger); background: rgba(231, 76, 60, 0.1); }
  .tag-marca { border-color: var(--secondary); color: var(--secondary); background: rgba(230, 126, 34, 0.1); }
  .tag-distance { border-color: var(--primary); color: var(--primary); background: rgba(46, 204, 113, 0.1); font-weight: 600; }
  .tag-gravel { border-color: var(--gravel-color); color: var(--gravel-color); background: rgba(211, 84, 0, 0.1); }
  .tag-saturday { border-color: #8e44ad; color: #8e44ad; background: rgba(142, 68, 173, 0.1); }
  .tag-carbono { border-color: #1ABC9C; color: #1ABC9C; background: rgba(26, 188, 156, 0.1); font-weight: 600; }
  .tag-rating { border-color: #f1c40f; color: #f1c40f; background: rgba(241, 196, 15, 0.1); font-weight: 700; }
  .map-container { flex: 1; position: relative; z-index: 1; }
  #map { width: 100%; height: 100%; }
  .map-legend { position: absolute; bottom: 2rem; right: 1rem; z-index: 800; background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(8px); padding: 1.2rem; border-radius: 12px; border: 1px solid #333; }
  .map-legend h4 { font-size: 0.8rem; margin-bottom: 0.6rem; color: var(--primary); font-weight: 700; text-transform: uppercase; }
  .legend-item { display: flex; align-items: center; margin-bottom: 0.4rem; font-size: 0.85rem; color: var(--gray); }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; border: 2px solid rgba(255,255,255,0.3); }
  .map-btn-group { position: absolute; top: 1.5rem; right: 1.5rem; z-index: 800; display: flex; flex-direction: column; gap: 0.8rem; }
  .map-btn { background: var(--darker); border: 1px solid #444; color: white; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; }
  .map-btn:hover { background: var(--primary); color: var(--dark); border-color: var(--primary); }
  .leaflet-popup-content-wrapper { background: var(--darker) !important; color: var(--light) !important; border-radius: 16px !important; border: 2px solid var(--primary) !important; }
  .leaflet-popup-tip { background: var(--darker) !important; }
  .leaflet-popup-close-button { color: var(--gray) !important; font-size: 22px !important; top: 8px !important; right: 12px !important; }
  .popup-content { padding: 0.8rem; }
  .popup-content h3 { color: var(--primary); font-family: 'Montserrat', sans-serif; margin-bottom: 0.8rem; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
  .popup-rating { font-size: 0.9rem; color: #f1c40f; font-weight: 600; background: rgba(241, 196, 15, 0.1); padding: 2px 8px; border-radius: 8px; }
  .popup-info { font-size: 0.9rem; margin-bottom: 0.5rem; display: flex; align-items: flex-start; gap: 10px; color: #ddd; }
  .popup-info i { color: var(--secondary); width: 16px; text-align: center; margin-top: 3px; }
  .popup-marcas { margin-top: 1rem; padding-top: 0.8rem; border-top: 1px solid #333; }
  .popup-marcas h4 { font-size: 0.75rem; color: var(--gray); margin-bottom: 0.6rem; text-transform: uppercase; }
  .marcas-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .marca-badge { font-size: 0.8rem; padding: 0.3rem 0.8rem; border-radius: 6px; background: rgba(230, 126, 34, 0.15); color: var(--secondary); font-weight: 700; }
  .popup-directions { margin-top: 1.2rem; display: flex; align-items: center; justify-content: center; background: var(--primary); color: var(--dark); padding: 0.7rem; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 0.9rem; gap: 8px; }

  .sidebar-toggle { display: none; position: absolute; top: 1.2rem; left: 1.2rem; z-index: 1001; background: var(--primary); color: var(--dark); border: none; width: 45px; height: 45px; border-radius: 12px; font-size: 1.3rem; cursor: pointer; align-items: center; justify-content: center; }

<body>
<header>
  <h1><i class="fas fa-bicycle"></i> Talleres de bici de Cataluña y Andorra</h1>
  <div class="header-stats">
    <div class="header-stat"><i class="fas fa-wrench"></i> <span id="totalStats">0</span> Talleres</div>
    <div class="header-stat"><i class="fas fa-calendar-check"></i> <span id="satStats">0</span> Abren Sáb</div>
  </div>
</header>
<div class="main-container">
  <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Menú"><i class="fas fa-bars"></i></button>
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <button class="close-sidebar" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
    <div class="sidebar-controls">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Buscar nombre, ciudad, marca..." oninput="filterShops()" />
      </div>
      <div class="filter-group">
        <h4>Región</h4>
        <div class="filter-buttons" id="provinceFilters">
          <button class="filter-btn active" data-filter="all" onclick="setProvinceFilter('all', this)">Todas</button>
          <button class="filter-btn" data-filter="Barcelona" onclick="setProvinceFilter('Barcelona', this)">Barcelona</button>
          <button class="filter-btn" data-filter="Girona" onclick="setProvinceFilter('Girona', this)">Girona</button>
          <button class="filter-btn" data-filter="Lleida" onclick="setProvinceFilter('Lleida', this)">Lleida</button>
          <button class="filter-btn" data-filter="Tarragona" onclick="setProvinceFilter('Tarragona', this)">Tarragona</button>
          <button class="filter-btn" data-filter="Andorra" onclick="setProvinceFilter('Andorra', this)">Andorra</button>
        </div>
      </div>
      <div class="filter-group">
        <h4>Especialidad / Horario</h4>
        <div class="filter-buttons" id="typeFilters">
          <button class="filter-btn type-filter-btn active" data-filter="all" onclick="setTypeFilter('all', this)">Todos</button>
          <button class="filter-btn type-filter-btn" data-filter="electrica" onclick="setTypeFilter('electrica', this)">Eléctricas</button>
          <button class="filter-btn type-filter-btn" data-filter="oficial" onclick="setTypeFilter('oficial', this)">Serv. Oficial</button>
          <button class="filter-btn type-filter-btn" data-filter="carretera" onclick="setTypeFilter('carretera', this)">Carretera</button>
          <button class="filter-btn type-filter-btn" data-filter="mtb" onclick="setTypeFilter('mtb', this)">MTB</button>
          <button class="filter-btn type-filter-btn" data-filter="gravel" onclick="setTypeFilter('gravel', this)">Gravel</button>
          <button class="filter-btn type-filter-btn" data-filter="saturday" onclick="setTypeFilter('saturday', this)"><i class="fas fa-calendar-week" style="margin-right:4px;"></i>Abre Sábado</button>
        </div>
      </div>
      
      <div class="filter-group" style="border-top: 1px solid var(--primary); margin-top: 1.5rem; padding-top: 1.2rem;">
        <h4 style="color: var(--primary);">Sección Nueva: Especialistas Carbono</h4>
        <div class="filter-buttons" id="carbonFilters">
          <button class="filter-btn type-filter-btn" data-filter="carbono" onclick="setTypeFilter('carbono', this)"><i class="fas fa-paint-roller" style="margin-right:5px;"></i>Reparación Carbono y Pintura</button>
        </div>
      </div>

      <!-- NUEVO FILTRO RANKING GOOGLE -->
      <div class="filter-group" style="border-top: 1px solid #f1c40f; margin-top: 1.5rem; padding-top: 1.2rem;">
        <h4 style="color: #f1c40f;"><i class="fab fa-google" style="margin-right:5px;"></i>Ranking de Google</h4>
        <div class="filter-buttons">
          <button class="filter-btn sort-btn active" data-sort="default" onclick="setSortFilter('default', this)">Orden Normal</button>
          <button class="filter-btn sort-btn" data-sort="rating" onclick="setSortFilter('rating', this)">⭐ Mejor Valoradas</button>
        </div>
      </div>

    </div>
    <div class="shop-list" id="shopList"></div>
  </aside>
  <div class="map-container">
    <div id="map"></div>
    <div class="map-btn-group">
      <button class="map-btn" onclick="locateUser()" title="Mi ubicación"><i class="fas fa-crosshairs"></i></button>
      <button class="map-btn" onclick="resetView()" title="Vista General"><i class="fas fa-globe-europe"></i></button>
    </div>
    <div class="map-legend">
      <h4>Regiones</h4>
      <div class="legend-item"><div class="legend-dot" style="background: var(--cat-barcelona);"></div>Barcelona</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--cat-girona);"></div>Girona</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--cat-lleida);"></div>Lleida</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--cat-tarragona);"></div>Tarragona</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--cat-andorra);"></div>Andorra</div>
    </div>
  </div>
</div>

const googleRatings = {
  1: 4.7, 2: 4.5, 3: 4.6, 4: 4.8, 5: 4.4, 6: 4.8, 7: 4.3, 8: 4.6, 9: 4.9, 10: 4.7,
  11: 4.5, 12: 4.8, 14: 4.3, 16: 4.4, 17: 4.2, 18: 4.8, 19: 4.5, 21: 4.9, 22: 4.7,
  23: 4.5, 24: 4.6, 25: 4.8, 26: 4.7, 35: 4.9, 132: 4.6, 133: 4.8, 211: 4.9
};
shops.forEach(shop => {
  if (googleRatings[shop.id]) {
    shop.googleRating = googleRatings[shop.id];
  } else {
    // Asignación simulada realista para el filtro
    shop.googleRating = (4.1 + Math.random() * 0.8).toFixed(1);
  }
});

let currentProvinceFilter = 'all';
let currentTypeFilter = 'all';
let currentSort = 'default'; // 'default' o 'rating'
let markers = [];
let activeShopId = null;
let map;
let userLat = null;
let userLng = null;

function calculateDistance(lat1, lon1, lat2, lon2) {
  if (!lat1 || !lon1 || !lat2 || !lon2) return null;
  const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
  return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
}

function initMap() {
  map = L.map('map', { center: [41.9, 1.5], zoom: 8, zoomControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>', subdomains: 'abcd', maxZoom: 19
  }).addTo(map);
  L.control.zoom({ position: 'bottomleft' }).addTo(map);

  shops.forEach(shop => {
    const color = getProvinceColor(shop.location);
    const isOficial = shop.types.includes('oficial');
    const size = isOficial ? 14 : 10;
    const pulseClass = isOficial ? 'pulse-marker' : '';
    const markerHtml = `<div class="${pulseClass}" style="background: ${color}; width: ${size}px; height: ${size}px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 8px rgba(0,0,0,0.5);"></div>`;
    const icon = L.divIcon({ html: markerHtml, className: '', iconSize: [size, size], iconAnchor: [size/2, size/2], popupAnchor: [0, -size/2] });
    const marker = L.marker([shop.lat, shop.lng], { icon }).addTo(map);
    const popupContent = `
      <div class="popup-content">
        <h3>${shop.name} <span class="popup-rating"><i class="fas fa-star"></i> ${shop.googleRating}</span></h3>
        <div class="popup-info"><i class="fas fa-map-marker-alt"></i>${shop.address}, ${shop.location}</div>
        <div class="popup-info"><i class="fas fa-phone"></i><a href="tel:${shop.phone}" style="color: var(--primary); text-decoration: none;">${shop.phone}</a></div>
        <div class="popup-info"><i class="fas fa-tools"></i>${shop.desc}</div>
        <div class="popup-info"><i class="fas fa-calendar-week"></i>${shop.openSaturday ? 'Abre sábado' : 'Cerrado sábado'}</div>
        ${shop.marcas.length > 0 ? `<div class="popup-marcas"><h4>Marcas / Servicios</h4><div class="marcas-list">${shop.marcas.map(m => `<span class="marca-badge">${m}</span>`).join('')}</div></div>` : ''}
        <a href="https://www.google.com/maps/dir/?api=1&destination=${shop.lat},${shop.lng}" target="_blank" class="popup-directions"><i class="fas fa-directions"></i> Cómo llegar</a>
      </div>`;
    marker.bindPopup(popupContent);
    marker.on('click', () => { setActiveShop(shop.id); });
    markers.push({ marker, shop });
  });
  updateStats();
}

function getProvinceColor(location) {
  if (location === "Barcelona") return "#3498DB"; if (location === "Girona") return "#2ECC71";
  if (location === "Lleida") return "#F1C40F"; if (location === "Tarragona") return "#9B59B6";
  if (location === "Andorra") return "#E74C3C"; return "#95a5a6";
}

function getProvinceClass(location) {
  if (location === "Barcelona") return "province-bcn"; if (location === "Girona") return "province-gi";
  if (location === "Lleida") return "province-ll"; if (location === "Tarragona") return "province-tgn";
  if (location === "Andorra") return "province-ad"; return "";
}

function renderShopList(filteredShops) {
  const list = document.getElementById('shopList'); list.innerHTML = '';
  if (filteredShops.length === 0) { list.innerHTML = '<div style="text-align:center; color:var(--gray); padding:3rem 1rem;"><i class="fas fa-search" style="font-size:2rem; display:block; margin-bottom:1rem; color:#444;"></i>No se encontraron talleres.</div>'; return; }
  
  filteredShops.forEach(shop => {
    const item = document.createElement('div'); item.className = `shop-item${shop.id === activeShopId ? ' active' : ''}`;
    const displayMarcas = shop.marcas.slice(0, 3).map(m => `<span class="tag tag-marca">${m}</span>`).join('');
    const extraMarcas = shop.marcas.length > 3 ? `<span class="tag">+${shop.marcas.length - 3}</span>` : '';
    const typeTags = shop.types.map(t => { 
      if (t === 'electrica') return '<span class="tag tag-electrica">Eléctrica</span>'; 
      if (t === 'oficial') return '<span class="tag tag-oficial">Serv. Oficial</span>'; 
      if (t === 'gravel') return '<span class="tag tag-gravel">Gravel</span>'; 
      if (t === 'carbono') return '<span class="tag tag-carbono">Carbono y Pintura</span>'; 
      return ''; 
    }).filter(Boolean).join('');
    const satTag = shop.openSaturday ? '<span class="tag tag-saturday"><i class="fas fa-calendar-check" style="margin-right:3px;font-size:8px;"></i>Sáb</span>' : '';
    const distance = userLat ? calculateDistance(userLat, userLng, shop.lat, shop.lng) : null;
    const distanceTag = distance ? `<span class="tag tag-distance"><i class="fas fa-location-arrow" style="margin-right:3px;font-size:8px;"></i>${distance} km</span>` : '';
    const ratingTag = `<span class="tag tag-rating"><i class="fas fa-star" style="margin-right:3px;font-size:8px;"></i>${shop.googleRating}</span>`;
    item.innerHTML = `
      <div class="shop-header">
        <div class="shop-name">${shop.name}</div>
        <span class="shop-province ${getProvinceClass(shop.location)}">${shop.location}</span>
      </div>
      <div class="shop-contact"><div><i class="fas fa-map-pin"></i> ${shop.address}</div></div>
      <div class="shop-desc">${shop.desc}</div>
      <div class="shop-tags">${ratingTag} ${typeTags} ${displayMarcas} ${extraMarcas} ${satTag} ${distanceTag}</div>`;
    item.addEventListener('click', () => { flyToShop(shop.id); });
    list.appendChild(item);
  });
}

function getFilteredShops() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  let filtered = shops.filter(s => {
    const matchProvince = currentProvinceFilter === 'all' || s.location === currentProvinceFilter;
    let matchType = currentTypeFilter === 'all' || s.types.includes(currentTypeFilter);
    if (currentTypeFilter === 'saturday') matchType = s.openSaturday === true;
    const matchSearch = !query || s.name.toLowerCase().includes(query) || s.location.toLowerCase().includes(query) || s.marcas.some(m => m.toLowerCase().includes(query)) || s.desc.toLowerCase().includes(query) || s.address.toLowerCase().includes(query);
    return matchProvince && matchType && matchSearch;
  });

  // Lógica de Ordenación
  if (currentSort === 'rating') {
    filtered.sort((a, b) => parseFloat(b.googleRating) - parseFloat(a.googleRating));
  } else if (userLat && userLng) {
    filtered.sort((a, b) => parseFloat(calculateDistance(userLat, userLng, a.lat, a.lng)) - parseFloat(calculateDistance(userLat, userLng, b.lat, b.lng)));
  }

  return filtered;
}

function filterShops() { const filtered = getFilteredShops(); renderShopList(filtered); updateMarkerVisibility(filtered); updateStats(filtered); }
function setProvinceFilter(filter, btn) { currentProvinceFilter = filter; document.querySelectorAll('#provinceFilters .filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); filterShops(); }
function setTypeFilter(filter, btn) { 
  currentTypeFilter = filter; 
  document.querySelectorAll('.type-filter-btn').forEach(b => b.classList.remove('active')); 
  btn.classList.add('active'); 
  filterShops(); 
}
function setSortFilter(sort, btn) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterShops();
}
function updateMarkerVisibility(filteredShops) { const filteredIds = new Set(filteredShops.map(s => s.id)); markers.forEach(({ marker, shop }) => { marker.setOpacity(filteredIds.has(shop.id) ? 1 : 0.1); }); }
function flyToShop(id) {
  const shop = shops.find(s => s.id === id); if (!shop) return; activeShopId = id;
  map.flyTo([shop.lat, shop.lng], 14, { duration: 0.8 });
  const m = markers.find(m => m.shop.id === id); if (m) setTimeout(() => m.marker.openPopup(), 600);
  document.querySelectorAll('.shop-item').forEach(el => el.classList.remove('active'));
  const filtered = getFilteredShops(); const idx = filtered.findIndex(s => s.id === id);
  const items = document.querySelectorAll('.shop-item');
  if (items[idx]) { items[idx].classList.add('active'); items[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  if (window.innerWidth <= 900) toggleSidebar(false);
}
function setActiveShop(id) { activeShopId = id; document.querySelectorAll('.shop-item').forEach(el => el.classList.remove('active')); const filtered = getFilteredShops(); const idx = filtered.findIndex(s => s.id === id); const items = document.querySelectorAll('.shop-item'); if (items[idx]) { items[idx].classList.add('active'); items[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' }); } }
function updateStats(filtered = null) { const data = filtered || shops; document.getElementById('totalStats').textContent = data.length; document.getElementById('satStats').textContent = data.filter(s => s.openSaturday).length; }
function resetView() { map.flyTo([41.9, 1.5], 8, { duration: 0.8 }); }
function locateUser() {
  if(!navigator.geolocation) { alert("Tu navegador no soporta geolocalización."); return; }
  navigator.geolocation.getCurrentPosition(position => {
    userLat = position.coords.latitude; userLng = position.coords.longitude;
    map.flyTo([userLat, userLng], 12, { duration: 1.5 });
    L.circleMarker([userLat, userLng], { radius: 8, fillColor: "#fff", color: '#2ECC71', weight: 3, opacity: 1, fillOpacity: 0.8 }).addTo(map).bindPopup("Estás aquí").openPopup();
    filterShops();
  }, () => { alert("No se pudo obtener la ubicación. Comprueba los permisos."); });
}
function toggleSidebar(forceState = null) {
  const sidebar = document.getElementById('sidebar'); const overlay = document.getElementById('overlay');
  const isOpen = forceState !== null ? forceState : !sidebar.classList.contains('open');
  if (isOpen) { sidebar.classList.add('open'); overlay.classList.add('active'); } else { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
}
initMap(); renderShopList(shops);
</script>
